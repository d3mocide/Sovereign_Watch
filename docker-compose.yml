networks:
  sovereign-net-frontend:
    driver: bridge
  sovereign-net-backend:
    driver: bridge

volumes:
  sovereign-vol-redpanda:
  sovereign-vol-postgres:
  sovereign-vol-redis:


services:
  # --- Ingestion & Streaming ---
  sovereign-redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sovereign-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 2G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://sovereign-redpanda:9092,external://localhost:29092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://sovereign-redpanda:8082,external://localhost:28082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    volumes:
      - sovereign-vol-redpanda:/var/lib/redpanda/data
    networks:
      - sovereign-net-backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redpanda Topic Init (one-shot) ---
  # Runs init-topics.sh after the broker is healthy.
  # To add a new topic, edit backend/redpanda/init-topics.sh — do not inline commands here.
  sovereign-redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sovereign-redpanda-init
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
    networks:
      - sovereign-net-backend
    volumes:
      - ./backend/redpanda/init-topics.sh:/init-topics.sh:ro
    entrypoint: /bin/bash
    command: [ "/init-topics.sh" ]
    restart: "no"

  # --- Ingestion: Maritime AIS ---
  sovereign-ais-poller:
    build:
      context: ./backend/ingestion/maritime_poller
      dockerfile: Dockerfile
    container_name: sovereign-ais-poller
    environment:
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - AISHUB_USERNAME=${AISHUB_USERNAME}
      - AIS_PRIMARY_SOURCE=${AIS_PRIMARY_SOURCE:-aisstream}
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - REDIS_HOST=sovereign-redis
      - REDIS_PORT=6379
      - CENTER_LAT=${CENTER_LAT:-45.5152}
      - CENTER_LON=${CENTER_LON:--122.6784}
      - COVERAGE_RADIUS_NM=${COVERAGE_RADIUS_NM:-150}
      - ARBITRATION_CLEANUP_INTERVAL=${ARBITRATION_CLEANUP_INTERVAL:-30}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
      sovereign-redis:
        condition: service_started
    restart: unless-stopped

  # --- Ingestion: Aviation ADS-B ---
  sovereign-adsb-poller:
    build:
      context: ./backend/ingestion/aviation_poller
      dockerfile: Dockerfile
    container_name: sovereign-adsb-poller
    environment:
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - REDIS_URL=redis://sovereign-redis:6379
      - CENTER_LAT=${CENTER_LAT:-45.5152}
      - CENTER_LON=${CENTER_LON:--122.6784}
      - COVERAGE_RADIUS_NM=${COVERAGE_RADIUS_NM:-150}
      - OPENSKY_ENABLED=${OPENSKY_ENABLED:-false}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID:-}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET:-}
      - OPENSKY_RATE_LIMIT_PERIOD=${OPENSKY_RATE_LIMIT_PERIOD:-0}
      - OPENSKY_WATCHLIST_RATE_LIMIT_PERIOD=${OPENSKY_WATCHLIST_RATE_LIMIT_PERIOD:-0}
      - OPENSKY_WATCHLIST_ENABLED=${OPENSKY_WATCHLIST_ENABLED:-false}
      - OPENSKY_WATCHLIST_AUTO_SEED=${OPENSKY_WATCHLIST_AUTO_SEED:-true}
      - OPENSKY_WATCHLIST_SEED_TYPES=${OPENSKY_WATCHLIST_SEED_TYPES:-military,government,drone}
      - OPENSKY_WATCHLIST_TTL_DAYS=${OPENSKY_WATCHLIST_TTL_DAYS:-7}
      - OPENSKY_WATCHLIST_BATCH_SIZE=${OPENSKY_WATCHLIST_BATCH_SIZE:-100}
      - HOLDING_PATTERN_THRESHOLD=${HOLDING_PATTERN_THRESHOLD:-300}
      - HOLDING_WINDOW_S=${HOLDING_WINDOW_S:-300}
      - HEADING_CHANGE_THRESHOLD=${HEADING_CHANGE_THRESHOLD:-2}
      - MIN_CIRCLE_DURATION=${MIN_CIRCLE_DURATION:-60}
      - MIN_DIRECTIONAL_CONSISTENCY=${MIN_DIRECTIONAL_CONSISTENCY:-0.7}
      - MIN_VELOCITY_KNOTS=${MIN_VELOCITY_KNOTS:-0}
      - OPENAIP_API_KEY=${OPENAIP_API_KEY}
      - OPENAIP_BBOX_EXPAND_DEG=${OPENAIP_BBOX_EXPAND_DEG:-2.0}
      - OPENAIP_TYPES=${OPENAIP_TYPES}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
      sovereign-redis:
        condition: service_started
    restart: unless-stopped

  # --- Ingestion: Space Domain ---
  sovereign-space-pulse:
    build:
      context: ./backend/ingestion/space_pulse
      dockerfile: Dockerfile
    container_name: sovereign-space-pulse
    environment:
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - REDIS_HOST=sovereign-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@sovereign-timescaledb:5432/${POSTGRES_DB:-sovereign_watch}
      - SPACE_TLE_FETCH_HOUR=${SPACE_TLE_FETCH_HOUR:-${ORBITAL_TLE_FETCH_HOUR:-2}}
      - SATNOGS_DB_INTERVAL_H=${SATNOGS_DB_INTERVAL_H:-24}
      - SATNOGS_NETWORK_INTERVAL_H=${SATNOGS_NETWORK_INTERVAL_H:-1}
      - AURORA_INTERVAL_S=${AURORA_INTERVAL_S:-300}
      - KP_INTERVAL_S=${KP_INTERVAL_S:-900}
      - SCALES_INTERVAL_S=${SCALES_INTERVAL_S:-900}
      - SATNOGS_API_TOKEN=${SATNOGS_API_TOKEN:-}
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY:-}
      - FIRMS_SOURCE=${FIRMS_SOURCE:-VIIRS_NOAA20_NRT,VIIRS_NOAA21_NRT,VIIRS_SNPP_NRT}
      - FIRMS_FETCH_INTERVAL_M=${FIRMS_FETCH_INTERVAL_M:-10}
      - FIRMS_DAYS_BACK=${FIRMS_DAYS_BACK:-1}
      - FIRMS_MIN_FRP=${FIRMS_MIN_FRP:-0.5}
      - CENTER_LAT=${CENTER_LAT:-45.5152}
      - CENTER_LON=${CENTER_LON:--122.6784}
      - COVERAGE_RADIUS_NM=${COVERAGE_RADIUS_NM:-150}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
      sovereign-redis:
        condition: service_started
      sovereign-timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # --- Ingestion: Infrastructure (Cables, Outages, Datacenters, FCC Towers) ---
  sovereign-infra-poller:
    build:
      context: ./backend/ingestion/infra_poller
      dockerfile: Dockerfile
    container_name: sovereign-infra-poller
    environment:
      - REDIS_URL=redis://sovereign-redis:6379/0
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@sovereign-timescaledb:5432/${POSTGRES_DB:-sovereign_watch}
      - POLL_FCC_START_HOUR=${POLL_FCC_START_HOUR:-3}
      - POLL_INTERVAL_NDBC_MINUTES=${POLL_INTERVAL_NDBC_MINUTES:-15}
      - POLL_INTERVAL_PEERINGDB_HOURS=${POLL_INTERVAL_PEERINGDB_HOURS:-24}
      - POLL_INTERVAL_NWS_MINUTES=${POLL_INTERVAL_NWS_MINUTES:-10}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redis:
        condition: service_started
      sovereign-timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # --- Ingestion: Geopolitical OSINT (GDELT) ---
  sovereign-gdelt-pulse:
    build:
      context: ./backend/ingestion/gdelt_pulse
      dockerfile: Dockerfile
    container_name: sovereign-gdelt-pulse
    environment:
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - POLL_INTERVAL=900
      - REDIS_URL=redis://sovereign-redis:6379
      - GDELT_CONFLICT_ONLY=${GDELT_CONFLICT_ONLY:-true}
      - RELIEFWEB_POLL_INTERVAL=${RELIEFWEB_POLL_INTERVAL:-1800}
      - RELIEFWEB_APPNAME=${RELIEFWEB_APPNAME:-}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
    restart: unless-stopped

  # --- Ingestion: RF Infrastructure ---
  sovereign-rf-pulse:
    build:
      context: ./backend/ingestion/rf_pulse
      dockerfile: Dockerfile
    container_name: sovereign-rf-pulse
    environment:
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - REDIS_HOST=sovereign-redis
      - REDIS_PORT=6379
      - CENTER_LAT=${CENTER_LAT:-45.5152}
      - CENTER_LON=${CENTER_LON:--122.6784}
      - COVERAGE_RADIUS_NM=${COVERAGE_RADIUS_NM:-150}
      - RF_ARD_INTERVAL_H=${RF_ARD_INTERVAL_H:-24}
      - RF_NOAA_INTERVAL_H=${RF_NOAA_INTERVAL_H:-168}
      - RF_RADIOREF_INTERVAL_H=${RF_RADIOREF_INTERVAL_H:-168}
      - RADIOREF_APP_KEY=${RADIOREF_APP_KEY}
      - RADIOREF_USERNAME=${RADIOREF_USERNAME}
      - RADIOREF_PASSWORD=${RADIOREF_PASSWORD}
      - RADIOREF_STATE_IDS=${RADIOREF_STATE_IDS:-AUTO}
      - RF_RR_FETCH_HOUR=${RF_RR_FETCH_HOUR:-4}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
      sovereign-redis:
        condition: service_started
    restart: unless-stopped

  # --- Processing: TAK Clausalizer ---
  sovereign-tak-clausalizer:
    build:
      context: ./backend/ingestion/tak_clausalizer
      dockerfile: Dockerfile
    container_name: sovereign-tak-clausalizer
    environment:
      - KAFKA_BROKERS=sovereign-redpanda:9092
      - REDIS_HOST=sovereign-redis
      - REDIS_PORT=6379
      - DB_DSN=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@sovereign-timescaledb:5432/${POSTGRES_DB:-sovereign_watch}
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-redpanda:
        condition: service_healthy
      sovereign-redis:
        condition: service_started
      sovereign-timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # --- Persistence ---
  sovereign-timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: sovereign-timescaledb
    shm_size: 1g
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_watch}
    volumes:
      - sovereign-vol-postgres:/home/postgres/pgdata/data
      - ./backend/db/initdb:/docker-entrypoint-initdb.d
    networks:
      - sovereign-net-backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  sovereign-redis:
    image: redis:alpine
    container_name: sovereign-redis
    command: redis-server --appendonly yes
    volumes:
      - sovereign-vol-redis:/data
    networks:
      - sovereign-net-backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Backend API ---
  # Runs schema migrations before starting uvicorn (see backend/api/migrate.py).
  sovereign-backend:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: sovereign-backend
    environment:
      - DB_DSN=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@sovereign-timescaledb:5432/${POSTGRES_DB:-sovereign_watch}
      - CENTER_LAT=${CENTER_LAT:-45.5152}
      - CENTER_LON=${CENTER_LON:--122.6784}
      - COVERAGE_RADIUS_NM=${COVERAGE_RADIUS_NM:-150}
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY:-}
      - FIRMS_SOURCE=${FIRMS_SOURCE:-VIIRS_NOAA20_NRT,VIIRS_NOAA21_NRT,VIIRS_SNPP_NRT}
      - TRACK_HISTORY_MAX_LIMIT=${TRACK_HISTORY_MAX_LIMIT:-1000}
      - TRACK_HISTORY_MAX_HOURS=${TRACK_HISTORY_MAX_HOURS:-168}
      - TRACK_REPLAY_MAX_LIMIT=${TRACK_REPLAY_MAX_LIMIT:-10000}
      - TRACK_REPLAY_MAX_HOURS=${TRACK_REPLAY_MAX_HOURS:-168}
      - TRACK_SEARCH_MAX_LIMIT=${TRACK_SEARCH_MAX_LIMIT:-100}
      - NEWS_RSS_URLS
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - RADIOREF_APP_KEY=${RADIOREF_APP_KEY}
      - RADIOREF_USERNAME=${RADIOREF_USERNAME}
      - RADIOREF_PASSWORD=${RADIOREF_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - LITELLM_MODEL=${LITELLM_MODEL:-secure-core}
      - OPEN_API_BASE=${OPEN_API_BASE:-http://host.docker.internal:11434}
      - OPEN_API_KEY=${OPEN_API_KEY}
      - OPEN_API_MODEL=${OPEN_API_MODEL:-llama3}
      - OPEN_API_LABEL=${OPEN_API_LABEL:-Llama3}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - "JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env — generate with: openssl rand -hex 32}"
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_LABEL=${GEMINI_LABEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - ANTHROPIC_LABEL=${ANTHROPIC_LABEL}
      - MODELS_YAML_PATH=/app/models.yaml
      - LITELLM_CONFIG_PATH=/app/litellm_config.yaml
    volumes:
      - ./backend/ai/models.yaml:/app/models.yaml:ro
      - ./backend/ai/litellm_config.yaml:/app/litellm_config.yaml:ro
      - ./backend/db/migrations:/app/migrations:ro
      - ./frontend/public/world-countries.json:/app/support/world-countries.json:ro
    networks:
      - sovereign-net-backend
    depends_on:
      sovereign-timescaledb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- JS8Call Radio Terminal ---
  sovereign-js8call:
    build:
      context: ./js8call
      dockerfile: Dockerfile
    container_name: sovereign-js8call
    environment:
      - KIWI_HOST=${KIWI_HOST:-kiwisdr.example.com}
      - KIWI_PORT=${KIWI_PORT:-8073}
      - KIWI_FREQ=${KIWI_FREQ:-14078}
      - KIWI_MODE=${KIWI_MODE:-usb}
      - MY_GRID=${MY_GRID:-CN85}
      - JS8CALL_HOST=0.0.0.0
      - JS8CALL_PORT=2442
      - BRIDGE_PORT=8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - "JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env — generate with: openssl rand -hex 32}"
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    networks:
      - sovereign-net-backend
    cap_add: []
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Frontend (prod: nginx serving compiled static bundle) ---
  # VITE_* vars are baked into the bundle at build time via build.args.
  # To change them you must rebuild the image: docker compose build sovereign-frontend
  sovereign-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}
        VITE_ENABLE_MAPBOX: ${VITE_ENABLE_MAPBOX:-true}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_CENTER_LAT: ${CENTER_LAT:-45.5152}
        VITE_CENTER_LON: ${CENTER_LON:--122.6784}
        VITE_COVERAGE_RADIUS_NM: ${COVERAGE_RADIUS_NM:-150}
        VITE_ENABLE_3D_TERRAIN: ${VITE_ENABLE_3D_TERRAIN:-false}
        VITE_JS8_WS_URL: ${VITE_JS8_WS_URL}
        VITE_JS8_BASE_URL: ${VITE_JS8_BASE_URL}
    container_name: sovereign-frontend
    networks:
      - sovereign-net-frontend
      - sovereign-net-backend
    restart: unless-stopped

  # --- Nginx Reverse Proxy ---
  sovereign-nginx:
    image: nginx:alpine
    container_name: sovereign-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - sovereign-net-frontend
      - sovereign-net-backend
    depends_on:
      sovereign-frontend:
        condition: service_started
      sovereign-backend:
        condition: service_healthy
      sovereign-js8call:
        condition: service_started
    restart: unless-stopped
