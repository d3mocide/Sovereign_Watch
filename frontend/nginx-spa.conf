server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Never cache the SPA entrypoint. A stale index can keep old hashed bundles
    # and retired API routes alive behind a CDN or reverse proxy after deploys.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # SPA routing — unknown paths fall back to index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed JS/CSS/font bundles: cache for 1 year (immutable, fingerprinted by Vite)
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images: 30-day cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
