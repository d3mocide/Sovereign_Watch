events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------
    # Upstream definitions — all internal Docker network hostnames
    # ----------------------------------------------------------------
    upstream frontend {
        server sovereign-frontend:3700;
    }

    upstream backend {
        server sovereign-backend:8000;
    }

    upstream js8call {
        server sovereign-js8call:8080;
    }

    # ----------------------------------------------------------------
    # Main server block — single exposed port
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Common proxy headers applied to all locations
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Backend REST API + WebSocket (/api/tracks/live) ─────────
        location /api/ {
            proxy_pass http://backend;

            # WebSocket upgrade headers (for /api/tracks/live)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Health check (no /api prefix)
        location /health {
            proxy_pass http://backend;
        }

        # ── JS8Call: WebSocket + REST API (/api/kiwi/*, /api/stations, /health)
        # Scoped under /js8/ to avoid conflicts with backend /api/ and /health.
        # Trailing slash on proxy_pass strips the /js8 prefix before forwarding:
        #   /js8/ws/js8         → js8call:8080/ws/js8
        #   /js8/api/kiwi/nodes → js8call:8080/api/kiwi/nodes
        location /js8/ {
            proxy_pass http://js8call/;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Frontend (Vite dev server + HMR WebSocket) ───────────────
        location / {
            proxy_pass http://frontend;

            # WebSocket upgrade needed for Vite HMR
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ----------------------------------------------------------------
    # Connection upgrade map (required for WebSocket proxying)
    # ----------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ""       close;
    }

    # ----------------------------------------------------------------
    # TLS template — uncomment and configure for production.
    #
    # Prerequisites:
    #   1. Obtain a certificate (Let's Encrypt via Certbot, or your CA):
    #        certbot certonly --standalone -d your.domain.com
    #   2. Place cert/key paths below (or mount them via Docker volume).
    #   3. Redirect HTTP → HTTPS by replacing the port-80 server block above
    #      with the redirect stub below, and enable this HTTPS block.
    #
    # HTTP → HTTPS redirect (replaces the existing server { listen 80; } block):
    # server {
    #     listen 80;
    #     server_name your.domain.com;
    #     return 301 https://$host$request_uri;
    # }
    #
    # HTTPS termination:
    # server {
    #     listen 443 ssl;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    #
    #     # Modern TLS only
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # HSTS (also set in the FastAPI security-headers middleware)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... same location blocks as above ...
    # }
    # ----------------------------------------------------------------
}
