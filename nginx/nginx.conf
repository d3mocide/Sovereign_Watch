worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ----------------------------------------------------------------
    # Upstream definitions — all internal Docker network hostnames
    # ----------------------------------------------------------------
    upstream frontend {
        server sovereign-frontend:80;   # prod: nginx static server
    }

    upstream backend {
        server sovereign-backend:8000;
    }

    upstream js8call {
        server sovereign-js8call:8080;
    }

    # Connection upgrade map (required for WebSocket proxying)
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ""       close;
    }

    # ----------------------------------------------------------------
    # Main server block — single exposed port
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Common proxy headers applied to all locations
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Backend REST API + WebSocket (/api/tracks/live) ─────────
        location /api/ {
            proxy_pass http://backend;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Backend WebSocket specifically (/ws/infrastructure/iss-stream) ──
        location /ws/ {
            proxy_pass http://backend;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Health check (no /api prefix)
        location /health {
            proxy_pass http://backend;
        }

        # ── JS8Call: WebSocket + REST API ───────────────────────────
        location /js8/ {
            proxy_pass http://js8call/;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Frontend (prod: nginx static, no HMR) ───────────────────
        location / {
            proxy_pass http://frontend;
        }
    }
}

